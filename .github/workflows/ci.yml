name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          cd backend
          pytest

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false

  load-mock-to-bq:
    needs: backend-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install google-cloud-bigquery requests
      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Truncate Benchling table
        run: |
          export GCP_PROJECT_ID=my-fastapi-demo-490623
          export BQ_DATASET_ID=drug_discovery_demo
          export BQ_TABLE_ID=benchling_data
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID"
          echo "BQ_DATASET_ID=$BQ_DATASET_ID"
          echo "BQ_TABLE_ID=$BQ_TABLE_ID"
          pip install google-cloud-bigquery
          python -c 'import os; print("PYTHON ENV:", os.environ.get("GCP_PROJECT_ID"), os.environ.get("BQ_DATASET_ID"), os.environ.get("BQ_TABLE_ID")); from google.cloud import bigquery; project=os.environ["GCP_PROJECT_ID"]; dataset=os.environ["BQ_DATASET_ID"]; table=os.environ["BQ_TABLE_ID"]; print("Project:", project); print("Dataset:", dataset); print("Table:", table); sql="TRUNCATE TABLE `" + project + "." + dataset + "." + table + "`"; print("SQL to execute:", sql); client=bigquery.Client(project=project); client.query(sql).result(); print("Truncated table:", table)'
      - name: Load Benchling mock data to BigQuery
        env:
          GCP_PROJECT_ID: my-fastapi-demo-490623
          BQ_DATASET_ID: drug_discovery_demo
          BQ_TABLE_ID: benchling_data
        run: |
          cd backend/scripts
          python load_mocked_to_bq.py --endpoint benchling
      - name: Truncate CDD table
        run: |
          export GCP_PROJECT_ID=my-fastapi-demo-490623
          export BQ_DATASET_ID=drug_discovery_demo
          export BQ_TABLE_ID=cdd_vault_data
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID"
          echo "BQ_DATASET_ID=$BQ_DATASET_ID"
          echo "BQ_TABLE_ID=$BQ_TABLE_ID"
          pip install google-cloud-bigquery
          python -c 'import os; print("PYTHON ENV:", os.environ.get("GCP_PROJECT_ID"), os.environ.get("BQ_DATASET_ID"), os.environ.get("BQ_TABLE_ID")); from google.cloud import bigquery; project=os.environ["GCP_PROJECT_ID"]; dataset=os.environ["BQ_DATASET_ID"]; table=os.environ["BQ_TABLE_ID"]; print("Project:", project); print("Dataset:", dataset); print("Table:", table); sql="TRUNCATE TABLE `" + project + "." + dataset + "." + table + "`"; print("SQL to execute:", sql); client=bigquery.Client(project=project); client.query(sql).result(); print("Truncated table:", table)'
      - name: Load CDD mock data to BigQuery
        env:
          GCP_PROJECT_ID: my-fastapi-demo-490623
          BQ_DATASET_ID: drug_discovery_demo
          BQ_TABLE_ID: cdd_vault_data
        run: |
          cd backend/scripts
          python load_mocked_to_bq.py --endpoint cdd
      - name: Truncate Mosaic table
        run: |
          export GCP_PROJECT_ID=my-fastapi-demo-490623
          export BQ_DATASET_ID=drug_discovery_demo
          export BQ_TABLE_ID=mosaic_inventory
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID"
          echo "BQ_DATASET_ID=$BQ_DATASET_ID"
          echo "BQ_TABLE_ID=$BQ_TABLE_ID"
          pip install google-cloud-bigquery
          python -c 'import os; print("PYTHON ENV:", os.environ.get("GCP_PROJECT_ID"), os.environ.get("BQ_DATASET_ID"), os.environ.get("BQ_TABLE_ID")); from google.cloud import bigquery; project=os.environ["GCP_PROJECT_ID"]; dataset=os.environ["BQ_DATASET_ID"]; table=os.environ["BQ_TABLE_ID"]; print("Project:", project); print("Dataset:", dataset); print("Table:", table); sql="TRUNCATE TABLE `" + project + "." + dataset + "." + table + "`"; print("SQL to execute:", sql); client=bigquery.Client(project=project); client.query(sql).result(); print("Truncated table:", table)'
      - name: Load Mosaic mock data to BigQuery
        env:
          GCP_PROJECT_ID: my-fastapi-demo-490623
          BQ_DATASET_ID: drug_discovery_demo
          BQ_TABLE_ID: mosaic_inventory
        run: |
          cd backend/scripts
          python load_mocked_to_bq.py --endpoint mosaic
