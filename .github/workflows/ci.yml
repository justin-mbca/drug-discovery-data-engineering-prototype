name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          cd backend
          pytest

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false

  load-mock-to-bq:
    needs: backend-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install google-cloud-bigquery requests
      - name: Set up Google Cloud credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Load Benchling mock data to BigQuery
        env:
          GCP_PROJECT_ID: my-fastapi-demo-490623
          BQ_DATASET_ID: your_dataset
          BQ_TABLE_ID: your_table
        run: |
          cd backend/scripts
          python load_mocked_to_bq.py --endpoint benchling
      - name: Load CDD mock data to BigQuery
        env:
          GCP_PROJECT_ID: my-fastapi-demo-490623
          BQ_DATASET_ID: your_dataset
          BQ_TABLE_ID: your_table
        run: |
          cd backend/scripts
          python load_mocked_to_bq.py --endpoint cdd
      - name: Load Mosaic mock data to BigQuery
        env:
          GCP_PROJECT_ID: my-fastapi-demo-490623
          BQ_DATASET_ID: your_dataset
          BQ_TABLE_ID: your_table
        run: |
          cd backend/scripts
          python load_mocked_to_bq.py --endpoint mosaic
